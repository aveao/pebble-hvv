name: Build and attach PBW to release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y nodejs npm libsdl1.2debian libfdt1

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Pebble SDK
        run: |
          uv tool install pebble-tool --python 3.13
          pebble sdk install latest

      - name: Build
        run: pebble build

      - name: Upload PBW to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/pebble-hvv.pbw
